<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Cinematic Intro</title>

<!-- GSAP CDN (for pro animation) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #0a0a0a, #000);
    font-family: Arial, sans-serif;
}

/* SCENE */
.scene {
    width: 100vw;
    height: 100vh;
    perspective: 1200px;
    position: relative;
}

/* CAMERA LAYER */
.camera {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
}

/* PLAYERS */
.player {
    position: absolute;
    bottom: 0;
    width: 200px;
    height: 300px;
    background-size: cover;
    background-position: center;
    transform: translateY(400px);
}

/* PLACEHOLDER PLAYER IMAGES */
.player1 { left: 5%; background-image: url('https://i.imgur.com/1.jpg'); }
.player2 { left: 25%; background-image: url('https://i.imgur.com/2.jpg'); }
.player3 { left: 45%; background-image: url('https://i.imgur.com/3.jpg'); }
.player4 { left: 65%; background-image: url('https://i.imgur.com/4.jpg'); }
.player5 { left: 80%; background-image: url('https://i.imgur.com/5.jpg'); }

/* TROPHY */
.trophy {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 100px;
}

/* BAT */
.bat {
    position: absolute;
    bottom: 150px;
    left: 50%;
    font-size: 80px;
    transform-origin: bottom center;
    transform: rotate(-90deg);
}

/* BALL */
.ball {
    position: absolute;
    bottom: 200px;
    left: 50%;
    font-size: 30px;
}

/* TEXT */
.title {
    position: absolute;
    top: 70%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 40px;
    opacity: 0;
}

/* PARTICLES */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    pointer-events: none;
}

</style>
</head>

<body>

<div class="scene">
    <div class="camera">

        <!-- PLAYERS -->
        <div class="player player1"></div>
        <div class="player player2"></div>
        <div class="player player3"></div>
        <div class="player player4"></div>
        <div class="player player5"></div>

        <!-- TROPHY -->
        <div class="trophy">🏆</div>

        <!-- BAT + BALL -->
        <div class="bat">🏏</div>
        <div class="ball">⚪</div>

        <!-- TITLE -->
        <div class="title">INDIAN PREMIER LEAGUE</div>

    </div>
</div>

<!-- AUDIO -->
<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

/* MUSIC START */
const music = document.getElementById("bgm");
setTimeout(() => {
    music.play();
}, 500);

/* PLAYER ENTRY */
gsap.to(".player", {
    y: 0,
    duration: 1.5,
    stagger: 0.2,
    ease: "power3.out"
});

/* CAMERA ZOOM */
gsap.to(".camera", {
    scale: 1.2,
    duration: 4,
    ease: "power2.inOut"
});

/* TROPHY ENTRY */
gsap.to(".trophy", {
    scale: 1.2,
    rotation: 360,
    duration: 2,
    delay: 1
});

/* BAT SWING */
gsap.to(".bat", {
    rotation: 0,
    duration: 0.5,
    delay: 2,
    ease: "power2.inOut"
});

/* BALL HIT */
gsap.to(".ball", {
    x: 500,
    y: -300,
    duration: 1,
    delay: 2.2,
    onStart: explodeParticles
});

/* TITLE SHOW */
gsap.to(".title", {
    opacity: 1,
    duration: 2,
    delay: 3
});

/* PARTICLE EXPLOSION */
function explodeParticles() {
    for (let i = 0; i < 50; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        document.body.appendChild(p);

        let x = window.innerWidth / 2;
        let y = window.innerHeight / 2;

        gsap.set(p, { x: x, y: y });

        gsap.to(p, {
            x: x + (Math.random() - 0.5) * 600,
            y: y + (Math.random() - 0.5) * 600,
            opacity: 0,
            duration: 1.5,
            onComplete: () => p.remove()
        });
    }
}

</script>

</body>
</html>
